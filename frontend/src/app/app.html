<a class="skip-link" href="#main">Aller au contenu</a>

<div class="shell">
  <header class="shell__header">
    <div class="container shell__header-inner">
      <a class="brand" routerLink="/" aria-label="Veille Boisée — accueil">
        <span class="brand__mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M16 3c-5.5 4-9 8.5-9 14 0 4.3 2.7 7.8 6.5 9v3h5v-3c3.8-1.2 6.5-4.7 6.5-9 0-5.5-3.5-10-9-14z"
              fill="currentColor"
              opacity="0.95"
            />
            <path
              d="M16 7v19"
              stroke="#faf7f0"
              stroke-width="1.2"
              stroke-linecap="round"
            />
            <path
              d="M16 14c-1.8-1-3.2-1.6-5-1.8M16 18c-2-1-3.6-1.5-5.5-1.7M16 14c1.8-1 3.2-1.6 5-1.8M16 18c2-1 3.6-1.5 5.5-1.7"
              stroke="#faf7f0"
              stroke-width="1.2"
              stroke-linecap="round"
            />
          </svg>
        </span>
        <span class="brand__name">Veille Boisée</span>
      </a>

      @if (auth.isAuthenticated()) {
        <button class="header-logout" (click)="auth.logout()" type="button">
          <svg viewBox="0 0 20 20" width="16" height="16" fill="none" aria-hidden="true">
            <path d="M7 3H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M13 14l3-4-3-4M16 10H8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Déconnexion
        </button>
      }
    </div>
  </header>

  @if (showBackButton()) {
    <nav class="shell__back-nav" aria-label="Retour">
      <div class="container">
        <a class="back-link" routerLink="/">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" aria-hidden="true">
            <path d="M19 12H5M11 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Accueil
        </a>
      </div>
    </nav>
  }

  <main id="main" class="shell__main">
    <router-outlet />
  </main>

  <footer class="shell__footer">
    <div class="container shell__footer-inner">
      <p class="shell__footer-meta">
        Un outil citoyen indépendant · données routées vers la commune ou l'ONF
      </p>
      <nav class="shell__footer-nav" aria-label="Liens légaux">
        <a href="#">Mentions</a>
        <span aria-hidden="true">·</span>
        <a href="#">Confidentialité</a>
        <span aria-hidden="true">·</span>
        <a href="#">Contact</a>
      </nav>
    </div>
  </footer>
</div>
